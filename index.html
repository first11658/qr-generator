<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="QR Generator">
    <title>QR Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
        const firebaseConfig = {
            apiKey: "AIzaSyDFJ7vjB4tcQNU0s5HmhiTcrWtgLMghVps",
            authDomain: "qr-generator-35bd8.firebaseapp.com",
            databaseURL: "https://qr-generator-35bd8-default-rtdb.firebaseio.com",
            projectId: "qr-generator-35bd8",
            storageBucket: "qr-generator-35bd8.firebasestorage.app",
            messagingSenderId: "324115853417",
            appId: "1:324115853417:web:8edc86fc6c6576d014b2f8"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window._db = db; window._ref = ref; window._set = set;
        window._get = get; window._onValue = onValue;
        window._firebaseReady = true;
        document.dispatchEvent(new Event('firebaseReady'));
    </script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html,body { width:100%; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
        body { background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; }

        /* Login */
        #loginScreen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .login-card { background:white; border-radius:20px; padding:40px 30px; width:100%; max-width:380px; box-shadow:0 20px 60px rgba(0,0,0,0.2); text-align:center; }
        .login-card .logo { font-size:3em; margin-bottom:10px; }
        .login-card h1 { color:#667eea; font-size:1.6em; margin-bottom:6px; }
        .login-card p { color:#888; font-size:0.9em; margin-bottom:24px; }
        .login-card input { width:100%; padding:14px 16px; border:2px solid #e0e0e0; border-radius:10px; font-size:1.1em; font-family:inherit; text-align:center; margin-bottom:12px; }
        .login-card input:focus { outline:none; border-color:#667eea; }
        .btn-login { width:100%; padding:14px; background:linear-gradient(135deg,#667eea,#764ba2); color:white; border:none; border-radius:10px; font-size:1.1em; font-weight:700; cursor:pointer; }
        .login-hint { color:#aaa; font-size:0.8em; margin-top:10px; }
        .recent-users { margin-top:18px; }
        .recent-users p { color:#666; font-size:0.85em; margin-bottom:8px; }
        .recent-chips { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
        .chip { padding:5px 12px; background:#f0f4ff; border:1px solid #667eea; border-radius:20px; color:#667eea; font-size:0.82em; cursor:pointer; font-weight:600; }
        .chip:hover { background:#667eea; color:white; }

        /* App */
        #appScreen { display:none; padding:10px; }
        .topbar { display:flex; align-items:center; justify-content:space-between; color:white; padding:8px 4px 12px; }
        .topbar h1 { font-size:1.3em; }
        .user-badge { background:rgba(255,255,255,0.25); padding:5px 12px; border-radius:20px; font-size:0.85em; font-weight:600; }
        .btn-logout { background:rgba(255,255,255,0.2); border:none; color:white; padding:5px 10px; border-radius:8px; cursor:pointer; font-size:0.8em; margin-left:6px; }
        .content { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        @media(max-width:700px){ .content{ grid-template-columns:1fr; } }
        .card { background:white; border-radius:14px; padding:16px; box-shadow:0 6px 20px rgba(0,0,0,0.15); }
        .card h2 { color:#667eea; font-size:1.1em; border-bottom:2px solid #667eea; padding-bottom:8px; margin-bottom:12px; }
        .form-group { margin-bottom:10px; }
        label { display:block; font-size:0.85em; font-weight:600; color:#444; margin-bottom:5px; }
        input,select,textarea { width:100%; padding:9px 10px; border:2px solid #e0e0e0; border-radius:8px; font-size:0.95em; font-family:inherit; -webkit-appearance:none; }
        input:focus,select:focus,textarea:focus { outline:none; border-color:#667eea; }
        textarea { resize:vertical; min-height:65px; }
        .tabs { display:flex; border-bottom:2px solid #e0e0e0; margin-bottom:12px; }
        .tab { flex:1; padding:8px; border:none; background:none; color:#888; font-weight:600; font-size:0.9em; cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px; }
        .tab.active { color:#667eea; border-bottom-color:#667eea; }
        .tab-content { display:none; }
        .tab-content.active { display:block; }
        .btn-group { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
        .btn { flex:1; padding:10px; border:none; border-radius:8px; font-size:0.9em; font-weight:600; cursor:pointer; min-width:60px; }
        .btn-primary { background:linear-gradient(135deg,#667eea,#764ba2); color:white; }
        .btn-secondary { background:#f0f0f0; color:#333; }
        .btn-success { background:#51cf66; color:white; }
        .btn-danger { background:#ff6b6b; color:white; }
        .btn-warning { background:#ffa94d; color:white; }
        #qrcode { text-align:center; margin:12px 0; }
        #qrcode canvas { border-radius:8px; border:2px solid #f0f0f0; padding:6px; max-width:100%; }
        .qr-info { background:#f8f9fa; padding:8px 10px; border-radius:6px; font-size:0.8em; color:#666; margin:8px 0; display:none; }
        .qr-info.show { display:block; }
        .toast { padding:9px 12px; border-radius:8px; font-size:0.85em; margin-bottom:10px; border-left:4px solid; display:none; }
        .toast.show { display:block; animation:fadeIn 0.3s; }
        .toast.success { background:#d4edda; color:#155724; border-color:#51cf66; }
        .toast.info { background:#d0ebff; color:#1864ab; border-color:#339af0; }
        .toast.error { background:#ffe3e3; color:#c92a2a; border-color:#ff6b6b; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
        .edit-banner { background:#fff3cd; border:2px solid #ffa94d; border-radius:8px; padding:8px 12px; margin-bottom:10px; font-size:0.85em; color:#664d03; display:none; align-items:center; gap:8px; }
        .edit-banner.show { display:flex; }
        .edit-banner span { flex:1; }
        .sync-status { font-size:0.78em; margin-bottom:8px; }
        .history-list { display:flex; flex-direction:column; gap:8px; max-height:400px; overflow-y:auto; margin-top:10px; }
        .history-item { background:#f8f9fa; border-left:3px solid #667eea; border-radius:8px; padding:10px; }
        .history-item.active-edit { border-left-color:#ffa94d; background:#fff8f0; }
        .history-item-time { font-size:0.72em; color:#999; margin-bottom:3px; }
        .history-item-label { font-size:0.8em; font-weight:600; color:#667eea; margin-bottom:3px; }
        .history-item-text { font-size:0.82em; color:#333; margin-bottom:6px; word-break:break-all; overflow:hidden; max-height:36px; }
        .history-item-actions { display:flex; gap:5px; flex-wrap:wrap; }
        .history-item-actions .btn { padding:5px 8px; font-size:0.75em; min-width:45px; }
        .empty-state { text-align:center; color:#bbb; padding:30px 0; font-size:0.9em; }

        /* Scanner */
        .scanner-modal { display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.88); z-index:200; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
        .scanner-modal.show { display:flex; }
        .scanner-box { background:black; border-radius:14px; overflow:hidden; width:100%; max-width:360px; position:relative; }
        .scanner-box video { width:100%; display:block; }
        .scanner-overlay { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:220px; height:220px; border:3px solid #667eea; border-radius:12px; box-shadow:0 0 0 9999px rgba(0,0,0,0.45); }
        .scanner-line { position:absolute; top:0; left:0; right:0; height:3px; background:#667eea; animation:scan 2s linear infinite; }
        @keyframes scan { 0%{top:0} 100%{top:100%} }
        .scanner-label { color:white; margin-top:14px; font-size:0.9em; opacity:0.85; text-align:center; }
        .scanner-result { color:#51cf66; font-size:0.9em; margin-top:6px; font-weight:600; text-align:center; min-height:20px; }

        /* Modal */
        .modal-overlay { display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.5); z-index:100; align-items:center; justify-content:center; padding:20px; }
        .modal-overlay.show { display:flex; }
        .modal { background:white; border-radius:14px; padding:20px; width:100%; max-width:400px; }
        .modal h3 { color:#667eea; margin-bottom:12px; }
        .modal label { display:block; font-size:0.85em; font-weight:600; color:#444; margin-bottom:5px; }
        .modal input { width:100%; padding:9px 10px; border:2px solid #e0e0e0; border-radius:8px; font-size:0.95em; font-family:inherit; margin-bottom:10px; }
        .modal input:focus { outline:none; border-color:#667eea; }
    </style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
    <div class="login-card">
        <div class="logo">📱</div>
        <h1>QR Generator</h1>
        <p>พิมพ์ชื่อของคุณเพื่อเข้าใช้งาน</p>
        <input type="text" id="nameInput" placeholder="ชื่อของคุณ เช่น First, John..." maxlength="30">
        <button class="btn-login" onclick="loginUser()">เข้าใช้งาน →</button>
        <div class="login-hint">ชื่อเดิม = โหลดประวัติเดิม ✨</div>
        <div class="recent-users" id="recentUsers" style="display:none">
            <p>ใช้งานล่าสุด:</p>
            <div class="recent-chips" id="recentChips"></div>
        </div>
    </div>
</div>

<!-- App -->
<div id="appScreen">
    <div class="topbar">
        <h1>📱 QR Generator</h1>
        <div>
            <span class="user-badge" id="userBadge">👤 User</span>
            <button class="btn-logout" onclick="logout()">ออก</button>
        </div>
    </div>

    <div class="content">
        <!-- Create -->
        <div class="card">
            <h2>🔧 Create QR</h2>
            <div class="toast" id="toast"></div>
            <div class="edit-banner" id="editBanner">
                <span>✏️ Edit mode — แก้แล้วกด Update</span>
                <button class="btn btn-secondary" style="min-width:auto;padding:4px 10px;font-size:0.8em;" onclick="cancelEdit()">Cancel</button>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('url',this)">URL</button>
                <button class="tab" onclick="switchTab('text',this)">Text</button>
                <button class="tab" onclick="switchTab('email',this)">Email</button>
            </div>

            <div id="tab-url" class="tab-content active">
                <div class="form-group"><label>🔗 URL</label>
                    <input type="url" id="urlInput" placeholder="https://example.com">
                </div>
            </div>
            <div id="tab-text" class="tab-content">
                <div class="form-group"><label>📝 Text</label>
                    <textarea id="textInput" placeholder="Enter any text..."></textarea>
                </div>
                <button class="btn btn-secondary" style="width:100%;margin-top:4px;" onclick="openScanner()">📷 Scan QR / DataMatrix</button>
            </div>
            <div id="tab-email" class="tab-content">
                <div class="form-group"><label>📧 Email</label>
                    <input type="email" id="emailInput" placeholder="example@email.com">
                </div>
                <div class="form-group"><label>Subject</label>
                    <input type="text" id="subjectInput" placeholder="Optional">
                </div>
            </div>

            <div class="form-group">
                <label>Code Type</label>
                <select id="codeType" onchange="onCodeTypeChange()">
                    <optgroup label="2D">
                        <option value="qrcode">QR Code</option>
                        <option value="datamatrix">DataMatrix</option>
                        <option value="pdf417">PDF-417</option>
                        <option value="azteccode">Aztec Code</option>
                    </optgroup>
                    <optgroup label="1D Barcode">
                        <option value="code128">Code 128</option>
                        <option value="code39">Code 39</option>
                        <option value="ean13">EAN-13</option>
                        <option value="ean8">EAN-8</option>
                        <option value="upca">UPC-A</option>
                    </optgroup>
                </select>
            </div>

            <div class="form-group" id="errorCorrectionGroup">
                <label>Error Correction (QR Only)</label>
                <select id="errorLevel">
                    <option value="L">L - Low (~7%)</option>
                    <option value="M" selected>M - Medium (~15%)</option>
                    <option value="Q">Q - High (~25%)</option>
                    <option value="H">H - Highest (~30%)</option>
                </select>
            </div>

            <div class="btn-group" id="normalBtns">
                <button class="btn btn-primary" onclick="generateQR()">⚡ Generate</button>
                <button class="btn btn-secondary" onclick="clearAll()">✕ Clear</button>
            </div>
            <div class="btn-group" id="updateBtns" style="display:none">
                <button class="btn btn-warning" onclick="updateHistoryItem()">💾 Update</button>
                <button class="btn btn-secondary" onclick="cancelEdit()">✕ Cancel</button>
            </div>

            <div id="qrcode"></div>
            <div class="qr-info" id="qrInfo"></div>
            <div class="btn-group" id="actionBtns" style="display:none">
                <button class="btn btn-success" onclick="downloadQR()">📥 Download</button>
                <button class="btn btn-secondary" onclick="copyData()">📋 Copy</button>
            </div>
        </div>

        <!-- History -->
        <div class="card">
            <h2>📚 History</h2>
            <div class="sync-status" id="syncStatus">⏳ Loading...</div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="clearHistory()">Clear All</button>
                <button class="btn btn-secondary" onclick="exportCSV()">Export CSV</button>
            </div>
            <div class="history-list" id="historyList">
                <div class="empty-state">No history yet</div>
            </div>
        </div>
    </div>
</div>

<!-- Scanner Modal -->
<div class="scanner-modal" id="scannerModal">
    <div class="scanner-box">
        <video id="scanVideo" autoplay playsinline muted></video>
        <div class="scanner-overlay"><div class="scanner-line"></div></div>
    </div>
    <div class="scanner-label">🔍 จ่อ QR Code หรือ DataMatrix ในกรอบ</div>
    <div class="scanner-result" id="scanResult"></div>
    <button class="btn btn-danger" style="min-width:120px;margin-top:14px;" onclick="closeScanner()">✕ ปิด</button>
</div>

<!-- Label Modal -->
<div class="modal-overlay" id="labelModal">
    <div class="modal">
        <h3>🏷️ ตั้งชื่อ / Label</h3>
        <input type="hidden" id="labelId">
        <label>ชื่อให้จำง่าย</label>
        <input type="text" id="labelInputModal" placeholder="เช่น ลิงก์เว็บทำงาน...">
        <div class="btn-group">
            <button class="btn btn-primary" onclick="saveLabel()">💾 Save</button>
            <button class="btn btn-secondary" onclick="closeLabelModal()">Cancel</button>
        </div>
    </div>
</div>

<script type="module">
// ── Lazy loaders (dynamic import so a CDN failure never crashes the app) ─────
let _bwipjsPromise = null;
function loadBwipjs() {
    if (!_bwipjsPromise) {
        _bwipjsPromise = import('https://cdn.jsdelivr.net/npm/bwip-js@3.5.0/+esm')
            .then(m => m.default || m)
            .catch(() => null);
    }
    return _bwipjsPromise;
}

let _codeReader = null;
async function getCodeReader() {
    if (_codeReader) return _codeReader;
    try {
        const { BrowserMultiFormatReader, DecodeHintType, BarcodeFormat } =
            await import('https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/+esm');
        const hints = new Map();
        hints.set(DecodeHintType.POSSIBLE_FORMATS, [
            BarcodeFormat.QR_CODE, BarcodeFormat.DATA_MATRIX,
            BarcodeFormat.PDF_417, BarcodeFormat.AZTEC,
            BarcodeFormat.CODE_128, BarcodeFormat.CODE_39,
            BarcodeFormat.EAN_13, BarcodeFormat.EAN_8,
        ]);
        _codeReader = new BrowserMultiFormatReader(hints);
        return _codeReader;
    } catch(e) {
        return null;
    }
}

// ── State ─────────────────────────────────────────
let currentUser = null;
let activeTab = 'url';
let currentData = null;
let editingId = null;
let historyListener = null;

// ── Recent Users ──────────────────────────────────
function getRecentUsers() { return JSON.parse(localStorage.getItem('recentUsers') || '[]'); }
function addRecentUser(name) {
    let list = getRecentUsers().filter(u => u !== name);
    list.unshift(name); if (list.length > 5) list.pop();
    localStorage.setItem('recentUsers', JSON.stringify(list));
}
function renderRecentUsers() {
    const list = getRecentUsers();
    if (!list.length) return;
    document.getElementById('recentUsers').style.display = 'block';
    document.getElementById('recentChips').innerHTML = list.map(n =>
        `<div class="chip" onclick="window.quickLogin('${n}')">${n}</div>`).join('');
}

// ── Login ─────────────────────────────────────────
window.loginUser = function() {
    const name = document.getElementById('nameInput').value.trim();
    if (!name) { alert('กรุณาพิมพ์ชื่อก่อนครับ'); return; }
    currentUser = name.toLowerCase().replace(/[^a-z0-9ก-๙]/g, '_');
    addRecentUser(name);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    document.getElementById('userBadge').textContent = '👤 ' + name;
    waitForFirebase(() => loadUserHistory());
};

window.quickLogin = function(name) {
    document.getElementById('nameInput').value = name;
    window.loginUser();
};

window.logout = function() {
    if (historyListener) historyListener();
    currentUser = null; currentData = null; editingId = null;
    document.getElementById('appScreen').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('nameInput').value = '';
    document.getElementById('qrcode').innerHTML = '';
    document.getElementById('qrInfo').classList.remove('show');
    document.getElementById('actionBtns').style.display = 'none';
    cancelEdit(); renderRecentUsers();
};

function waitForFirebase(cb) {
    if (window._firebaseReady) { cb(); return; }
    document.addEventListener('firebaseReady', cb, { once: true });
}

// ── Firebase ──────────────────────────────────────
function getUserRef() { return window._ref(window._db, `users/${currentUser}/history`); }

function loadUserHistory() {
    setSyncStatus('🔄 Loading...');
    historyListener = window._onValue(getUserRef(), (snapshot) => {
        const data = snapshot.val();
        const list = data ? Object.values(data).sort((a, b) => b.id - a.id) : [];
        localStorage.setItem('qrHistory_' + currentUser, JSON.stringify(list));
        renderHistory(list);
        setSyncStatus('☁️ Synced', 'green');
    }, () => {
        setSyncStatus('⚠️ Offline', 'orange');
        renderHistory(getList());
    });
}

async function saveToFirebase(list) {
    if (!currentUser || !window._firebaseReady) return;
    try {
        const obj = {};
        list.forEach(item => { obj['id_' + item.id] = item; });
        await window._set(getUserRef(), obj);
        setSyncStatus('☁️ Saved', 'green');
    } catch(e) { setSyncStatus('⚠️ Save failed', 'red'); }
}

// ── History ───────────────────────────────────────
function getList() { return JSON.parse(localStorage.getItem('qrHistory_' + currentUser) || '[]'); }
function saveList(list) {
    localStorage.setItem('qrHistory_' + currentUser, JSON.stringify(list));
    renderHistory(list);
    saveToFirebase(list);
}
function saveHistory(item) {
    const list = getList();
    list.unshift({ ...item, id: Date.now(), time: new Date().toLocaleString(), label: '' });
    if (list.length > 100) list.pop();
    saveList(list);
}
function renderHistory(list) {
    const el = document.getElementById('historyList');
    if (!list || !list.length) { el.innerHTML = '<div class="empty-state">No history yet</div>'; return; }
    el.innerHTML = list.map(item => `
        <div class="history-item" id="item-${item.id}">
            <div class="history-item-time">${item.time}</div>
            ${item.label ? `<div class="history-item-label">🏷️ ${item.label}</div>` : ''}
            <div class="history-item-text">${item.data.substring(0,60)}${item.data.length>60?'...':''}</div>
            <div class="history-item-actions">
                <button class="btn btn-secondary" onclick="window.loadHistory(${item.id})">👁 Load</button>
                <button class="btn btn-warning" onclick="window.startEdit(${item.id})">✏️ Edit</button>
                <button class="btn btn-secondary" onclick="window.openLabelModal(${item.id})">🏷️</button>
                <button class="btn btn-danger" onclick="window.deleteHistory(${item.id})">Del</button>
            </div>
        </div>`).join('');
}

// ── Tab ───────────────────────────────────────────
window.switchTab = function(tab, el) {
    activeTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
};

function getData() {
    if (activeTab === 'url') return document.getElementById('urlInput').value.trim();
    if (activeTab === 'text') return document.getElementById('textInput').value.trim();
    if (activeTab === 'email') {
        const e = document.getElementById('emailInput').value.trim();
        const s = document.getElementById('subjectInput').value.trim();
        return e ? 'mailto:' + e + (s ? '?subject=' + encodeURIComponent(s) : '') : '';
    }
    return '';
}

// ── Code Type ─────────────────────────────────────
window.onCodeTypeChange = function() {
    const type = document.getElementById('codeType').value;
    document.getElementById('errorCorrectionGroup').style.display = type === 'qrcode' ? 'block' : 'none';
};

// ── Generate ──────────────────────────────────────
window.generateQR = async function() {
    const data = getData();
    if (!data) { showToast('⚠️ Please enter something!', 'error'); return; }
    currentData = data;
    const codeType = document.getElementById('codeType').value;
    const ok = await renderCode(data, codeType);
    if (ok && !editingId) saveHistory({ data, type: activeTab, codeType, level: document.getElementById('errorLevel').value });
    if (ok) {
        const label = document.getElementById('codeType').options[document.getElementById('codeType').selectedIndex].text;
        showToast(`✅ ${label} created!`);
    }
};

async function renderCode(data, codeType) {
    const box = document.getElementById('qrcode');
    box.innerHTML = '';

    if (codeType === 'qrcode') {
        new QRCode(box, {
            text: data, width: 200, height: 200,
            colorDark: '#000', colorLight: '#fff',
            correctLevel: QRCode.CorrectLevel[document.getElementById('errorLevel').value]
        });
    } else {
        const canvas = document.createElement('canvas');
        box.appendChild(canvas);
        const bwipjs = await loadBwipjs();
        if (!bwipjs) {
            box.innerHTML = `<div style="color:red;font-size:0.85em;padding:10px;background:#ffe3e3;border-radius:8px;">⚠️ bwip-js โหลดไม่ได้</div>`;
            showToast('⚠️ bwip-js โหลดไม่ได้', 'error');
            return false;
        }
        try {
            bwipjs.toCanvas(canvas, {
                bcid: codeType,
                text: data,
                scale: 3,
                height: codeType === 'datamatrix' || codeType === 'azteccode' ? 20 : 10,
                includetext: ['code128','code39','ean13','ean8','upca'].includes(codeType),
                textxalign: 'center',
            });
            canvas.style.cssText = 'border-radius:8px;border:2px solid #f0f0f0;padding:6px;max-width:100%;';
        } catch(e) {
            box.innerHTML = `<div style="color:red;font-size:0.85em;padding:10px;background:#ffe3e3;border-radius:8px;">⚠️ Error: ${e.message}</div>`;
            showToast('⚠️ ' + e.message, 'error');
            return false;
        }
    }

    const label = document.getElementById('codeType').options[document.getElementById('codeType').selectedIndex].text;
    document.getElementById('qrInfo').textContent = `${label} • ${data.length} chars`;
    document.getElementById('qrInfo').classList.add('show');
    document.getElementById('actionBtns').style.display = 'flex';
    return true;
}

window.downloadQR = function() {
    const canvas = document.querySelector('#qrcode canvas');
    if (!canvas) return;
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    const codeType = document.getElementById('codeType').value;
    a.download = `${codeType}-${Date.now()}.png`;
    a.click();
    showToast('✅ Downloaded!');
};

window.copyData = function() {
    if (!currentData) return;
    navigator.clipboard.writeText(currentData).then(() => showToast('✅ Copied!'));
};

window.clearAll = function() {
    cancelEdit();
    ['urlInput','textInput','emailInput','subjectInput'].forEach(id => {
        const el = document.getElementById(id); if (el) el.value = '';
    });
    document.getElementById('qrcode').innerHTML = '';
    document.getElementById('qrInfo').classList.remove('show');
    document.getElementById('actionBtns').style.display = 'none';
    currentData = null;
};

// ── History Actions ───────────────────────────────
window.loadHistory = async function(id) {
    const item = getList().find(i => i.id === id);
    if (!item) return;
    fillForm(item);
    await renderCode(item.data, item.codeType || 'qrcode');
    currentData = item.data;
    showToast('📂 Loaded!', 'info');
};

window.startEdit = async function(id) {
    const item = getList().find(i => i.id === id);
    if (!item) return;
    editingId = id; fillForm(item);
    await renderCode(item.data, item.codeType || 'qrcode');
    currentData = item.data;
    document.getElementById('editBanner').classList.add('show');
    document.getElementById('normalBtns').style.display = 'none';
    document.getElementById('updateBtns').style.display = 'flex';
    document.getElementById('actionBtns').style.display = 'flex';
    document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active-edit'));
    const el = document.getElementById('item-' + id);
    if (el) el.classList.add('active-edit');
    showToast('✏️ Edit mode', 'info');
    window.scrollTo(0, 0);
};

window.updateHistoryItem = async function() {
    if (!editingId) return;
    const data = getData();
    if (!data) { showToast('⚠️ Data cannot be empty!', 'error'); return; }
    const codeType = document.getElementById('codeType').value;
    saveHistory({ data, type: activeTab, codeType, level: document.getElementById('errorLevel').value });
    currentData = data;
    await renderCode(data, codeType);
    cancelEdit();
    showToast('✅ สร้างประวัติใหม่แล้ว ประวัติเก่ายังอยู่ครบ!');
};

function cancelEdit() {
    editingId = null;
    document.getElementById('editBanner').classList.remove('show');
    document.getElementById('normalBtns').style.display = 'flex';
    document.getElementById('updateBtns').style.display = 'none';
    document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active-edit'));
}
window.cancelEdit = cancelEdit;

function fillForm(item) {
    const tabs = document.querySelectorAll('.tab');
    const contents = document.querySelectorAll('.tab-content');
    tabs.forEach(t => t.classList.remove('active'));
    contents.forEach(c => c.classList.remove('active'));
    const idx = ['url','text','email'].indexOf(item.type);
    if (idx >= 0) { tabs[idx].classList.add('active'); contents[idx].classList.add('active'); activeTab = item.type; }
    if (item.type === 'url') document.getElementById('urlInput').value = item.data;
    else if (item.type === 'text') document.getElementById('textInput').value = item.data;
    else if (item.type === 'email') {
        const match = item.data.match(/mailto:([^?]*)/);
        document.getElementById('emailInput').value = match ? match[1] : '';
    }
    document.getElementById('errorLevel').value = item.level || 'M';
    // restore code type
    if (item.codeType) {
        document.getElementById('codeType').value = item.codeType;
        window.onCodeTypeChange();
    }
}

window.deleteHistory = function(id) {
    if (editingId === id) cancelEdit();
    saveList(getList().filter(i => i.id !== id));
};

window.clearHistory = function() {
    if (confirm('Clear all history?')) { cancelEdit(); saveList([]); }
};

window.exportCSV = function() {
    const list = getList();
    if (!list.length) { alert('No history!'); return; }
    const csv = 'Date,Label,Type,Data\n' + list.map(i =>
        `"${i.time}","${i.label||''}","${i.type}","${i.data.replace(/"/g,'""')}"`).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'qr-history-' + currentUser + '.csv';
    a.click();
};

// ── Label Modal ───────────────────────────────────
window.openLabelModal = function(id) {
    const item = getList().find(i => i.id === id);
    if (!item) return;
    document.getElementById('labelId').value = id;
    document.getElementById('labelInputModal').value = item.label || '';
    document.getElementById('labelModal').classList.add('show');
};
window.saveLabel = function() {
    const id = parseInt(document.getElementById('labelId').value);
    const label = document.getElementById('labelInputModal').value.trim();
    const list = getList();
    const idx = list.findIndex(i => i.id === id);
    if (idx >= 0) list[idx].label = label;
    saveList(list); closeLabelModal();
    showToast('✅ Label saved!');
};
function closeLabelModal() { document.getElementById('labelModal').classList.remove('show'); }
window.closeLabelModal = closeLabelModal;
document.getElementById('labelModal').addEventListener('click', e => { if (e.target.id === 'labelModal') closeLabelModal(); });

// ── Scanner (ZXing) ───────────────────────────────
window.openScanner = async function() {
    const tabs = document.querySelectorAll('.tab');
    const contents = document.querySelectorAll('.tab-content');
    tabs.forEach(t => t.classList.remove('active'));
    contents.forEach(c => c.classList.remove('active'));
    tabs[1].classList.add('active'); contents[1].classList.add('active');
    activeTab = 'text';

    document.getElementById('scannerModal').classList.add('show');
    document.getElementById('scanResult').textContent = '⏳ กำลังโหลด...';

    const reader = await getCodeReader();
    if (!reader) {
        document.getElementById('scanResult').textContent = '⚠️ โหลด scanner ไม่ได้';
        return;
    }
    document.getElementById('scanResult').textContent = '';

    const video = document.getElementById('scanVideo');
    reader.decodeFromVideoDevice(null, video, (result) => {
        if (result) {
            const text = result.getText();
            const fmt = result.getBarcodeFormat();
            document.getElementById('textInput').value = text;
            document.getElementById('scanResult').textContent = `✅ ${fmt}: ${text.substring(0,40)}${text.length>40?'...':''}`;
            closeScanner();
            showToast(`✅ สแกนสำเร็จ! (${fmt})`);
        }
    });
};

window.closeScanner = function() {
    if (_codeReader) _codeReader.reset();
    document.getElementById('scannerModal').classList.remove('show');
    document.getElementById('scanResult').textContent = '';
};

// ── Helpers ───────────────────────────────────────
function setSyncStatus(msg, color = '#667eea') {
    const el = document.getElementById('syncStatus');
    if (el) { el.textContent = msg; el.style.color = color; }
}
function showToast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = 'toast ' + type + ' show';
    setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Init ──────────────────────────────────────────
document.getElementById('nameInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') window.loginUser();
});
renderRecentUsers();
</script>
