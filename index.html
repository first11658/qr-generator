<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="QR Generator">
    <title>QR Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 10px; }
        header { text-align: center; color: white; padding: 15px 0 10px; }
        header h1 { font-size: 1.5em; margin-bottom: 4px; }
        header p { font-size: 0.85em; opacity: 0.85; }
        .content { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 0 12px; }
        @media (max-width: 700px) { .content { grid-template-columns: 1fr; } }
        .card { background: white; border-radius: 14px; padding: 16px; box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
        .card h2 { color: #667eea; font-size: 1.1em; border-bottom: 2px solid #667eea; padding-bottom: 8px; margin-bottom: 12px; }
        .form-group { margin-bottom: 10px; }
        label { display: block; font-size: 0.85em; font-weight: 600; color: #444; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 9px 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 0.95em; font-family: inherit; -webkit-appearance: none; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; }
        textarea { resize: vertical; min-height: 65px; }
        .tabs { display: flex; border-bottom: 2px solid #e0e0e0; margin-bottom: 12px; }
        .tab { flex: 1; padding: 8px; border: none; background: none; color: #888; font-weight: 600; font-size: 0.9em; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; }
        .tab.active { color: #667eea; border-bottom-color: #667eea; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 0.9em; font-weight: 600; cursor: pointer; min-width: 60px; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-success { background: #51cf66; color: white; }
        .btn-danger { background: #ff6b6b; color: white; }
        .btn-warning { background: #ffa94d; color: white; }
        #qrcode { text-align: center; margin: 12px 0; }
        #qrcode canvas { border-radius: 8px; border: 2px solid #f0f0f0; padding: 6px; max-width: 100%; }
        .qr-info { background: #f8f9fa; padding: 8px 10px; border-radius: 6px; font-size: 0.8em; color: #666; margin: 8px 0; display: none; }
        .qr-info.show { display: block; }
        .toast { padding: 9px 12px; border-radius: 8px; font-size: 0.85em; margin-bottom: 10px; border-left: 4px solid; display: none; }
        .toast.show { display: block; animation: fadeIn 0.3s; }
        .toast.success { background: #d4edda; color: #155724; border-color: #51cf66; }
        .toast.info { background: #d0ebff; color: #1864ab; border-color: #339af0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

        /* editing mode banner */
        .edit-mode-banner { background: #fff3cd; border: 2px solid #ffa94d; border-radius: 8px; padding: 8px 12px; margin-bottom: 10px; font-size: 0.85em; color: #664d03; display: none; align-items: center; gap: 8px; }
        .edit-mode-banner.show { display: flex; }
        .edit-mode-banner span { flex: 1; }

        .history-list { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; margin-top: 10px; }
        .history-item { background: #f8f9fa; border-left: 3px solid #667eea; border-radius: 8px; padding: 10px; transition: all 0.2s; }
        .history-item.active-edit { border-left-color: #ffa94d; background: #fff8f0; }
        .history-item-time { font-size: 0.72em; color: #999; margin-bottom: 3px; }
        .history-item-label { font-size: 0.8em; font-weight: 600; color: #667eea; margin-bottom: 3px; }
        .history-item-text { font-size: 0.82em; color: #333; margin-bottom: 6px; word-break: break-all; overflow: hidden; max-height: 36px; }
        .history-item-actions { display: flex; gap: 5px; flex-wrap: wrap; }
        .history-item-actions .btn { padding: 5px 8px; font-size: 0.75em; min-width: 45px; }
        .empty-state { text-align: center; color: #bbb; padding: 30px 0; font-size: 0.9em; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top:0;left:0;right:0;bottom:0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal { background: white; border-radius: 14px; padding: 20px; width: 100%; max-width: 400px; }
        .modal h3 { color: #667eea; margin-bottom: 12px; }
        .modal label { display: block; font-size: 0.85em; font-weight: 600; color: #444; margin-bottom: 5px; }
        .modal input, .modal textarea { width: 100%; padding: 9px 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 0.95em; font-family: inherit; margin-bottom: 10px; }
        .modal input:focus, .modal textarea:focus { outline: none; border-color: #667eea; }
    </style>
</head>
<body>

<header>
    <h1>📱 QR Generator</h1>
    <p>Create QR Codes Instantly</p>
</header>

<div class="content">

    <!-- Generator Card -->
    <div class="card">
        <h2>🔧 Create QR</h2>

        <!-- Toast -->
        <div class="toast success" id="toast"></div>

        <!-- Edit mode banner -->
        <div class="edit-mode-banner" id="editBanner">
            <span>✏️ กำลังแก้ไขประวัติ — สร้าง QR เสร็จแล้วกด "Update"</span>
            <button class="btn btn-secondary" style="min-width:auto;padding:4px 10px;font-size:0.8em;" onclick="cancelEdit()">Cancel</button>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('url', this)">URL</button>
            <button class="tab" onclick="switchTab('text', this)">Text</button>
            <button class="tab" onclick="switchTab('email', this)">Email</button>
        </div>

        <div id="tab-url" class="tab-content active">
            <div class="form-group">
                <label>🔗 URL</label>
                <input type="url" id="urlInput" placeholder="https://example.com">
            </div>
        </div>
        <div id="tab-text" class="tab-content">
            <div class="form-group">
                <label>📝 Text</label>
                <textarea id="textInput" placeholder="Enter any text..."></textarea>
            </div>
        </div>
        <div id="tab-email" class="tab-content">
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" id="emailInput" placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label>Subject (optional)</label>
                <input type="text" id="subjectInput" placeholder="Email subject">
            </div>
        </div>

        <div class="form-group">
            <label>Error Correction</label>
            <select id="errorLevel">
                <option value="L">L - Low (~7%)</option>
                <option value="M" selected>M - Medium (~15%)</option>
                <option value="Q">Q - High (~25%)</option>
                <option value="H">H - Highest (~30%)</option>
            </select>
        </div>

        <!-- Buttons: ปกติ vs edit mode -->
        <div class="btn-group" id="normalBtns">
            <button class="btn btn-primary" onclick="generateQR()">⚡ Generate</button>
            <button class="btn btn-secondary" onclick="clearAll()">✕ Clear</button>
        </div>
        <div class="btn-group" id="updateBtns" style="display:none">
            <button class="btn btn-warning" onclick="updateHistoryItem()">💾 Update History</button>
            <button class="btn btn-secondary" onclick="cancelEdit()">✕ Cancel</button>
        </div>

        <div id="qrcode"></div>
        <div class="qr-info" id="qrInfo"></div>

        <div class="btn-group" id="actionBtns" style="display:none">
            <button class="btn btn-success" onclick="downloadQR()">📥 Download</button>
            <button class="btn btn-secondary" onclick="copyData()">📋 Copy</button>
        </div>
    </div>

    <!-- History Card -->
    <div class="card">
        <h2>📚 History</h2>
        <div class="btn-group">
            <button class="btn btn-secondary" onclick="clearHistory()">Clear All</button>
            <button class="btn btn-secondary" onclick="exportCSV()">Export CSV</button>
        </div>
        <div class="history-list" id="historyList">
            <div class="empty-state">No history yet</div>
        </div>
    </div>

</div>

<!-- Label Modal (rename) -->
<div class="modal-overlay" id="labelModal">
    <div class="modal">
        <h3>🏷️ ตั้งชื่อ / Label</h3>
        <input type="hidden" id="labelId">
        <label>ชื่อให้จำง่าย</label>
        <input type="text" id="labelInput" placeholder="เช่น ลิงก์เว็บทำงาน, QR บัตร...">
        <div class="btn-group">
            <button class="btn btn-primary" onclick="saveLabel()">💾 Save</button>
            <button class="btn btn-secondary" onclick="closeLabelModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
    let activeTab = 'url';
    let currentData = null;
    let editingId = null; // ID ของ item ที่กำลัง edit

    // ── Tab ──────────────────────────────────────────
    function switchTab(tab, el) {
        activeTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
    }

    function getData() {
        if (activeTab === 'url') return document.getElementById('urlInput').value.trim();
        if (activeTab === 'text') return document.getElementById('textInput').value.trim();
        if (activeTab === 'email') {
            const e = document.getElementById('emailInput').value.trim();
            const s = document.getElementById('subjectInput').value.trim();
            return e ? 'mailto:' + e + (s ? '?subject=' + encodeURIComponent(s) : '') : '';
        }
        return '';
    }

    // ── Generate QR (สร้างใหม่) ──────────────────────
    function generateQR() {
        const data = getData();
        if (!data) { showToast('⚠️ Please enter something!'); return; }

        currentData = data;
        renderQR(data);

        // บันทึกประวัติใหม่เฉพาะตอน generate ปกติ (ไม่ใช่ edit mode)
        if (!editingId) {
            saveHistory({ data, type: activeTab, level: document.getElementById('errorLevel').value });
        }
        showToast('✅ QR Code created!');
    }

    // ── Load from History (โหลดมาดู ไม่บันทึกใหม่) ──
    function loadHistory(id) {
        const list = getList();
        const item = list.find(i => i.id === id);
        if (!item) return;

        fillForm(item);
        renderQR(item.data);
        currentData = item.data;
        document.getElementById('actionBtns').style.display = 'flex';
        showToast('📂 Loaded — ประวัติยังอยู่ครบ', 'info');
    }

    // ── Edit History (แก้ไขแล้ว update ทับของเดิม) ──
    function startEdit(id) {
        const list = getList();
        const item = list.find(i => i.id === id);
        if (!item) return;

        editingId = id;
        fillForm(item);
        renderQR(item.data);
        currentData = item.data;

        // เปลี่ยน UI เป็น edit mode
        document.getElementById('editBanner').classList.add('show');
        document.getElementById('normalBtns').style.display = 'none';
        document.getElementById('updateBtns').style.display = 'flex';
        document.getElementById('actionBtns').style.display = 'flex';

        // highlight item ที่กำลัง edit
        document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active-edit'));
        const el = document.getElementById('item-' + id);
        if (el) el.classList.add('active-edit');

        showToast('✏️ Edit mode — แก้ข้อมูลแล้วกด Update', 'info');
        window.scrollTo(0, 0);
    }

    function updateHistoryItem() {
        if (!editingId) return;
        const data = getData();
        if (!data) { showToast('⚠️ Data cannot be empty!'); return; }

        // เพิ่มประวัติใหม่ (ประวัติเก่ายังอยู่)
        saveHistory({ data, type: activeTab, level: document.getElementById('errorLevel').value });

        currentData = data;
        renderQR(data);
        cancelEdit();
        showToast('✅ สร้างประวัติใหม่แล้ว ประวัติเก่ายังอยู่ครบ!');
    }

    function cancelEdit() {
        editingId = null;
        document.getElementById('editBanner').classList.remove('show');
        document.getElementById('normalBtns').style.display = 'flex';
        document.getElementById('updateBtns').style.display = 'none';
        document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active-edit'));
    }

    // ── Helper: fill form from history item ─────────
    function fillForm(item) {
        // reset tabs
        const tabs = document.querySelectorAll('.tab');
        const contents = document.querySelectorAll('.tab-content');
        tabs.forEach(t => t.classList.remove('active'));
        contents.forEach(c => c.classList.remove('active'));
        const idx = ['url','text','email'].indexOf(item.type);
        if (idx >= 0) { tabs[idx].classList.add('active'); contents[idx].classList.add('active'); activeTab = item.type; }

        if (item.type === 'url') document.getElementById('urlInput').value = item.data;
        else if (item.type === 'text') document.getElementById('textInput').value = item.data;
        else if (item.type === 'email') {
            const match = item.data.match(/mailto:([^?]*)/);
            document.getElementById('emailInput').value = match ? match[1] : '';
        }
        document.getElementById('errorLevel').value = item.level || 'M';
    }

    // ── Helper: render QR ────────────────────────────
    function renderQR(data) {
        const box = document.getElementById('qrcode');
        box.innerHTML = '';
        new QRCode(box, {
            text: data, width: 200, height: 200,
            colorDark: '#000', colorLight: '#fff',
            correctLevel: QRCode.CorrectLevel[document.getElementById('errorLevel').value]
        });
        const info = document.getElementById('qrInfo');
        info.textContent = activeTab.toUpperCase() + ' • ' + data.length + ' chars';
        info.classList.add('show');
        document.getElementById('actionBtns').style.display = 'flex';
    }

    // ── Download / Copy ──────────────────────────────
    function downloadQR() {
        const canvas = document.querySelector('#qrcode canvas');
        if (!canvas) return;
        const a = document.createElement('a');
        a.href = canvas.toDataURL('image/png');
        a.download = 'qr-' + Date.now() + '.png';
        a.click();
        showToast('✅ Downloaded!');
    }

    function copyData() {
        if (!currentData) return;
        navigator.clipboard.writeText(currentData).then(() => showToast('✅ Copied!'));
    }

    function clearAll() {
        cancelEdit();
        ['urlInput','textInput','emailInput','subjectInput'].forEach(id => {
            const el = document.getElementById(id); if (el) el.value = '';
        });
        document.getElementById('qrcode').innerHTML = '';
        document.getElementById('qrInfo').classList.remove('show');
        document.getElementById('actionBtns').style.display = 'none';
        currentData = null;
    }

    // ── History Storage ──────────────────────────────
    function getList() { return JSON.parse(localStorage.getItem('qrHistory') || '[]'); }
    function saveList(list) { localStorage.setItem('qrHistory', JSON.stringify(list)); renderHistory(); }

    function saveHistory(item) {
        const list = getList();
        list.unshift({ ...item, id: Date.now(), time: new Date().toLocaleString(), label: '' });
        if (list.length > 50) list.pop();
        saveList(list);
    }

    function renderHistory() {
        const list = getList();
        const el = document.getElementById('historyList');
        if (!list.length) { el.innerHTML = '<div class="empty-state">No history yet</div>'; return; }
        el.innerHTML = list.map(item => `
            <div class="history-item" id="item-${item.id}">
                <div class="history-item-time">${item.time}${item.editedAt ? ' · edited ' + item.editedAt : ''}</div>
                ${item.label ? `<div class="history-item-label">🏷️ ${item.label}</div>` : ''}
                <div class="history-item-text">${item.data.substring(0,60)}${item.data.length>60?'...':''}</div>
                <div class="history-item-actions">
                    <button class="btn btn-secondary" onclick="loadHistory(${item.id})">👁 Load</button>
                    <button class="btn btn-warning" onclick="startEdit(${item.id})">✏️ Edit</button>
                    <button class="btn btn-secondary" onclick="openLabelModal(${item.id})">🏷️</button>
                    <button class="btn btn-danger" onclick="deleteHistory(${item.id})">Del</button>
                </div>
            </div>
        `).join('');
    }

    function deleteHistory(id) {
        if (editingId === id) cancelEdit();
        saveList(getList().filter(i => i.id !== id));
    }

    function clearHistory() {
        if (confirm('Clear all history?')) { cancelEdit(); localStorage.removeItem('qrHistory'); renderHistory(); }
    }

    function exportCSV() {
        const list = getList();
        if (!list.length) { alert('No history!'); return; }
        const csv = 'Date,Label,Type,Data\n' + list.map(i =>
            `"${i.time}","${i.label||''}","${i.type}","${i.data.replace(/"/g,'""')}"`).join('\n');
        const a = document.createElement('a');
        a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
        a.download = 'qr-history.csv';
        a.click();
    }

    // ── Label Modal ──────────────────────────────────
    function openLabelModal(id) {
        const item = getList().find(i => i.id === id);
        if (!item) return;
        document.getElementById('labelId').value = id;
        document.getElementById('labelInput').value = item.label || '';
        document.getElementById('labelModal').classList.add('show');
    }

    function saveLabel() {
        const id = parseInt(document.getElementById('labelId').value);
        const label = document.getElementById('labelInput').value.trim();
        const list = getList();
        const idx = list.findIndex(i => i.id === id);
        if (idx >= 0) list[idx].label = label;
        saveList(list);
        closeLabelModal();
        showToast('✅ Label saved!');
    }

    function closeLabelModal() { document.getElementById('labelModal').classList.remove('show'); }
    document.getElementById('labelModal').addEventListener('click', e => { if (e.target.id === 'labelModal') closeLabelModal(); });

    // ── Toast ────────────────────────────────────────
    function showToast(msg, type = 'success') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'toast ' + type + ' show';
        setTimeout(() => el.classList.remove('show'), 2500);
    }

    renderHistory();
</script>
</body>
</html>
