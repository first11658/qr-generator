<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="QR Generator">
    <title>QR Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: env(safe-area-inset-top, 10px) env(safe-area-inset-right, 10px) env(safe-area-inset-bottom, 10px) env(safe-area-inset-left, 10px);
        }
        header { text-align: center; color: white; padding: 15px 0 10px; }
        header h1 { font-size: 1.5em; margin-bottom: 4px; }
        header p { font-size: 0.85em; opacity: 0.85; }
        .content {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 12px;
        }
        @media (max-width: 700px) {
            .content { grid-template-columns: 1fr; }
        }
        .card {
            background: white;
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            overflow-y: auto;
        }
        .card h2 { color: #667eea; font-size: 1.1em; border-bottom: 2px solid #667eea; padding-bottom: 8px; margin-bottom: 12px; }
        .form-group { margin-bottom: 10px; }
        label { display: block; font-size: 0.85em; font-weight: 600; color: #444; margin-bottom: 5px; }
        input, select, textarea {
            width: 100%;
            padding: 9px 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95em;
            font-family: inherit;
            -webkit-appearance: none;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; }
        textarea { resize: vertical; min-height: 65px; }
        .tabs { display: flex; border-bottom: 2px solid #e0e0e0; margin-bottom: 12px; }
        .tab {
            flex: 1;
            padding: 8px;
            border: none;
            background: none;
            color: #888;
            font-weight: 600;
            font-size: 0.9em;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }
        .tab.active { color: #667eea; border-bottom-color: #667eea; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-success { background: #51cf66; color: white; }
        .btn-danger { background: #ff6b6b; color: white; }
        #qrcode { text-align: center; margin: 12px 0; }
        #qrcode canvas { border-radius: 8px; border: 2px solid #f0f0f0; padding: 6px; max-width: 100%; }
        .qr-info { background: #f8f9fa; padding: 8px 10px; border-radius: 6px; font-size: 0.8em; color: #666; margin: 8px 0; display: none; }
        .qr-info.show { display: block; }
        .toast {
            background: #d4edda;
            color: #155724;
            padding: 9px 12px;
            border-radius: 8px;
            font-size: 0.85em;
            margin-bottom: 10px;
            border-left: 4px solid #51cf66;
            display: none;
        }
        .toast.show { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
        .history-list { display: flex; flex-direction: column; gap: 8px; max-height: 350px; overflow-y: auto; margin-top: 10px; }
        .history-item {
            background: #f8f9fa;
            border-left: 3px solid #667eea;
            border-radius: 6px;
            padding: 9px 10px;
        }
        .history-item-time { font-size: 0.72em; color: #999; margin-bottom: 3px; }
        .history-item-text { font-size: 0.82em; color: #333; margin-bottom: 6px; word-break: break-all; max-height: 36px; overflow: hidden; }
        .history-item-actions { display: flex; gap: 6px; }
        .history-item-actions .btn { padding: 4px 8px; font-size: 0.75em; }
        .empty-state { text-align: center; color: #bbb; padding: 30px 0; font-size: 0.9em; }
    </style>
</head>
<body>

<header>
    <h1>📱 QR Generator</h1>
    <p>Create QR Codes Instantly</p>
</header>

<div class="content">

    <!-- Generator -->
    <div class="card">
        <h2>🔧 Create QR</h2>

        <div class="toast" id="toast"></div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('url', this)">URL</button>
            <button class="tab" onclick="switchTab('text', this)">Text</button>
            <button class="tab" onclick="switchTab('email', this)">Email</button>
        </div>

        <div id="tab-url" class="tab-content active">
            <div class="form-group">
                <label>🔗 URL</label>
                <input type="url" id="urlInput" placeholder="https://example.com">
            </div>
        </div>

        <div id="tab-text" class="tab-content">
            <div class="form-group">
                <label>📝 Text</label>
                <textarea id="textInput" placeholder="Enter any text..."></textarea>
            </div>
        </div>

        <div id="tab-email" class="tab-content">
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" id="emailInput" placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label>Subject (optional)</label>
                <input type="text" id="subjectInput" placeholder="Email subject">
            </div>
        </div>

        <div class="form-group">
            <label>Error Correction</label>
            <select id="errorLevel">
                <option value="L">L - Low (~7%)</option>
                <option value="M" selected>M - Medium (~15%)</option>
                <option value="Q">Q - High (~25%)</option>
                <option value="H">H - Highest (~30%)</option>
            </select>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="generateQR()">⚡ Generate</button>
            <button class="btn btn-secondary" onclick="clearAll()">✕ Clear</button>
        </div>

        <div id="qrcode"></div>
        <div class="qr-info" id="qrInfo"></div>

        <div class="btn-group" id="actionBtns" style="display:none">
            <button class="btn btn-success" onclick="downloadQR()">📥 Download</button>
            <button class="btn btn-secondary" onclick="copyData()">📋 Copy</button>
        </div>
    </div>

    <!-- History -->
    <div class="card">
        <h2>📚 History</h2>
        <div class="btn-group">
            <button class="btn btn-secondary" onclick="clearHistory()">Clear All</button>
            <button class="btn btn-secondary" onclick="exportCSV()">Export CSV</button>
        </div>
        <div class="history-list" id="historyList">
            <div class="empty-state">No history yet</div>
        </div>
    </div>

</div>

<script>
    let activeTab = 'url';
    let currentData = null;

    function switchTab(tab, el) {
        activeTab = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('tab-' + tab).classList.add('active');
    }

    function getData() {
        if (activeTab === 'url') return document.getElementById('urlInput').value.trim();
        if (activeTab === 'text') return document.getElementById('textInput').value.trim();
        if (activeTab === 'email') {
            const e = document.getElementById('emailInput').value.trim();
            const s = document.getElementById('subjectInput').value.trim();
            return e ? 'mailto:' + e + (s ? '?subject=' + encodeURIComponent(s) : '') : '';
        }
        return '';
    }

    function generateQR() {
        const data = getData();
        if (!data) { toast('⚠️ Please enter something!'); return; }

        currentData = data;
        const level = document.getElementById('errorLevel').value;
        const box = document.getElementById('qrcode');
        box.innerHTML = '';

        new QRCode(box, {
            text: data,
            width: 200,
            height: 200,
            colorDark: '#000',
            colorLight: '#fff',
            correctLevel: QRCode.CorrectLevel[level]
        });

        const info = document.getElementById('qrInfo');
        info.textContent = activeTab.toUpperCase() + ' • ' + data.length + ' chars';
        info.classList.add('show');
        document.getElementById('actionBtns').style.display = 'flex';

        saveHistory({ data, type: activeTab, level });
        toast('✅ QR Code created!');
    }

    function downloadQR() {
        const canvas = document.querySelector('#qrcode canvas');
        if (!canvas) return;
        const a = document.createElement('a');
        a.href = canvas.toDataURL('image/png');
        a.download = 'qr-' + Date.now() + '.png';
        a.click();
        toast('✅ Downloaded!');
    }

    function copyData() {
        if (!currentData) return;
        navigator.clipboard.writeText(currentData).then(() => toast('✅ Copied!'));
    }

    function clearAll() {
        ['urlInput','textInput','emailInput','subjectInput'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = '';
        });
        document.getElementById('qrcode').innerHTML = '';
        document.getElementById('qrInfo').classList.remove('show');
        document.getElementById('actionBtns').style.display = 'none';
        currentData = null;
    }

    function saveHistory(item) {
        const list = JSON.parse(localStorage.getItem('qrHistory') || '[]');
        list.unshift({ ...item, id: Date.now(), time: new Date().toLocaleString() });
        if (list.length > 50) list.pop();
        localStorage.setItem('qrHistory', JSON.stringify(list));
        renderHistory();
    }

    function renderHistory() {
        const list = JSON.parse(localStorage.getItem('qrHistory') || '[]');
        const el = document.getElementById('historyList');
        if (!list.length) { el.innerHTML = '<div class="empty-state">No history yet</div>'; return; }
        el.innerHTML = list.map(item => `
            <div class="history-item">
                <div class="history-item-time">${item.time}</div>
                <div class="history-item-text">${item.data.substring(0,60)}${item.data.length>60?'...':''}</div>
                <div class="history-item-actions">
                    <button class="btn btn-secondary" onclick="loadHistory(${item.id})">Load</button>
                    <button class="btn btn-danger" onclick="deleteHistory(${item.id})">Del</button>
                </div>
            </div>
        `).join('');
    }

    function loadHistory(id) {
        const list = JSON.parse(localStorage.getItem('qrHistory') || '[]');
        const item = list.find(i => i.id === id);
        if (!item) return;

        const tabs = document.querySelectorAll('.tab');
        const contents = document.querySelectorAll('.tab-content');
        tabs.forEach(t => t.classList.remove('active'));
        contents.forEach(c => c.classList.remove('active'));

        const idx = ['url','text','email'].indexOf(item.type);
        if (idx >= 0) {
            tabs[idx].classList.add('active');
            contents[idx].classList.add('active');
            activeTab = item.type;
        }

        if (item.type === 'url') document.getElementById('urlInput').value = item.data;
        else if (item.type === 'text') document.getElementById('textInput').value = item.data;
        else if (item.type === 'email') {
            const match = item.data.match(/mailto:([^?]*)/);
            if (match) document.getElementById('emailInput').value = match[1];
        }

        generateQR();
    }

    function deleteHistory(id) {
        const list = JSON.parse(localStorage.getItem('qrHistory') || '[]').filter(i => i.id !== id);
        localStorage.setItem('qrHistory', JSON.stringify(list));
        renderHistory();
    }

    function clearHistory() {
        if (confirm('Clear all history?')) {
            localStorage.removeItem('qrHistory');
            renderHistory();
        }
    }

    function exportCSV() {
        const list = JSON.parse(localStorage.getItem('qrHistory') || '[]');
        if (!list.length) { alert('No history!'); return; }
        const csv = 'Date,Type,Data\n' + list.map(i => `"${i.time}","${i.type}","${i.data.replace(/"/g,'""')}"`).join('\n');
        const a = document.createElement('a');
        a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
        a.download = 'qr-history.csv';
        a.click();
    }

    function toast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2500);
    }

    renderHistory();
</script>
</body>
</html>
